<div class="page-wrapper">
    <div class="content">
    
        <!-- Page Header -->
        <div class="page-header">
            <div class="row">
                <app-back-bottn style="width: 50px;"></app-back-bottn>
                <div class="col-sm-10">
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a [routerLink]="['/patients/list/doctor/', doctor_id]">Pacientes </a></li>
                        <li class="breadcrumb-item"><i class="feather icon-chevron-right"></i></li>
                        <li class="breadcrumb-item active">{{ title }} </li>
                    </ul>
                </div>
            </div>
        </div>
        <!-- /Page Header -->
         <app-loading *ngIf="isLoading"></app-loading>
        <div class="row" *ngIf="!isLoading" >
            <!-- paciente -->
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        
                        <form [formGroup]="patientForm">
                            <div class="row" >
                                <div class="col-12">
                                    <div class="form-heading">
                                        <h4>Paciente Detalle {{ isEditMode ? '#'+patientId : '' }}</h4>
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-4">  
                                    <div class="form-group local-forms">
                                        <label >Nombre <span class="login-danger">*</span></label>
                                        <input class="form-control" formControlName="name" type="text"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-4">
                                    <div class="form-group local-forms">
                                        <label >Apellido <span class="login-danger">*</span></label>
                                        <input class="form-control" formControlName="surname" type="text"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-4">
                                    <div class="form-group local-forms">
                                        <label >N.Documento <span class="login-danger">*</span></label>
                                        <input class="form-control" formControlName="n_doc" type="text"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-4">
                                    <div class="form-group local-forms">
                                        <label >Teléfono móvil</label>
                                        <input class="form-control" formControlName="phone" type="text"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-4">
                                    <div class="form-group local-forms">
                                        <label >Email</label>
                                        <input class="form-control" formControlName="email" type="email"  >
                                    </div>
                                </div>
                                
                                <div class="col-12 col-md-6 col-xl-4">
                                    <div class="form-group local-forms">
                                        <label >Fecha de Nacimiento</label>
                                        <input class="form-control datetimepicker" formControlName="birth_date" type="date"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-4">
                                    <div class="form-group select-gender">
                                        <label class="gen-label">Género<span class="login-danger">*</span></label>
                                        <div class="form-check-inline">
                                            <label class="form-check-label">
                                                <input type="radio" formControlName="gender" value="1" class="form-check-input">Masculino
                                            </label>
                                        </div>
                                        <div class="form-check-inline">
                                            <label class="form-check-label">
                                                <input type="radio" formControlName="gender" value="2" class="form-check-input">Femenino
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-4">
                                    <div class="form-group local-forms">
                                        <label >Profesión</label>
                                        <input class="form-control" formControlName="education" type="text"  >
                                    </div>
                                </div>
                                
                                <div class="col-12 col-sm-12">
                                    <div class="form-group local-forms">
                                        <label>Dirección</label>
                                        <textarea class="form-control" formControlName="address" rows="3" cols="30"></textarea>
                                    </div>
                                </div>
                                
                                <div class="col-12 col-md-6 col-xl-6">
                                    <div class="form-group local-top-form">
                                        <label class="local-top">Foto</label>
                                        <div class="settings-btn upload-files-avator">
                                            <input type="file" accept="image/*" id="file" (change)="loadFile($event)" class="hide-input">
                                            <label for="file" class="upload">Seleccione Foto</label>
                                        </div>
                                    </div>
                                    <img *ngIf="IMAGE_PREVISUALIZA" [src]="IMAGE_PREVISUALIZA" style="width: 250px;" alt="">
                                </div>
                                <div class="col-12 col-md-6 col-xl-6">
                                    <div class="form-group local-forms">
                                        <label>Motivo de entrada</label>
                                        <textarea class="form-control" formControlName="current_desease" rows="3" cols="30"></textarea>
                                    </div>
                                </div>
                                
                            </div>
                            
                        </form>
                        
                    </div>
                </div>	
                	
            </div>
            <!-- fin paciente -->					
            <!-- antecedentes -->
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <form [formGroup]="patientForm">
                            <div class="row" >
                                <div class="col-12">
                                    <div class="form-heading">
                                        <h4>Patient Antecedents</h4>
                                    </div>
                                </div>
                                
                                <div class="col-12 col-sm-4">
                                    <div class="form-group local-forms">
                                        <label>Antecedente Personal</label>
                                        <textarea class="form-control" formControlName="antecedent_personal" rows="3" cols="30"></textarea>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-4">
                                    <div class="form-group local-forms">
                                        <label>Antecedente Familiar</label>
                                        <textarea class="form-control" formControlName="antecedent_family" rows="3" cols="30"></textarea>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-4">
                                    <div class="form-group local-forms">
                                        <label>Antecedente Alergico</label>
                                        <textarea class="form-control" formControlName="antecedent_alerg" rows="3" cols="30"></textarea>
                                    </div>
                                </div>
                                
                            </div>
                            
                        </form>
                        
                    </div>
                </div>
                	
            </div>
            <!-- fin antecedentes -->	
            <!-- acompañante -->
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <form [formGroup]="patientForm">
                            <div class="row" >
                                <div class="col-12">
                                    <div class="form-heading">
                                        <h4>Acompañate y/o Responsable</h4>
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Nombre Acompañante</label>
                                        <input class="form-control" formControlName="name_companion" type="text"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Apellido Acompañante</label>
                                        <input class="form-control" formControlName="surname_companion" type="text"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Teléfono Acompañante</label>
                                        <input class="form-control" formControlName="mobile_companion" type="text"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Relación con el paciente</label>
                                        <input class="form-control" formControlName="relationship_companion" type="text"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Nombre del Responsable</label>
                                        <input class="form-control" formControlName="name_responsable" type="text"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Apellido del Responsable</label>
                                        <input class="form-control" formControlName="surname_responsable" type="text"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Teléfono del Responsable</label>
                                        <input class="form-control" formControlName="mobile_responsable" type="text"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Relación con el paciente</label>
                                        <input class="form-control" formControlName="relationship_responsable" type="text"  >
                                    </div>
                                </div>
                                
                            </div>
                            
                        </form>
                        
                    </div>
                </div>
                	
            </div>
            <!-- fin acompañante -->	
            <!-- signos vitales -->
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <form [formGroup]="patientForm">
                            <div class="row" >
                                <div class="col-12">
                                    <div class="form-heading">
                                        <h4>Signos Vitales</h4>
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Presión Arterial TA (mm/Hg)</label>
                                        <input class="form-control" formControlName="ta" type="number"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Temperatura (ºC)</label>
                                        <input class="form-control" formControlName="temperature" type="number"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Frecuencia Card. (por minuto)</label>
                                        <input class="form-control" formControlName="fc" type="number"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Frecuencia Resp. (por minuto)</label>
                                        <input class="form-control" formControlName="fr" type="number"  >
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 col-xl-3">  
                                    <div class="form-group local-forms">
                                        <label >Peso (Kg)</label>
                                        <input class="form-control" formControlName="peso" type="number"  >
                                    </div>
                                </div>

                                <div *ngIf="text_validation" class="form-group row">
                                    <div class="col-md-12">
                                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                            <strong>!</strong> {{text_validation}}.
                                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close">
                                                <span aria-hidden="true"> </span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                
                                
                                <div class="col-12">
                                    <div class="doctor-submit text-end">
                                        <button type="button" [disabled]="isLoading || isSaving" class="btn btn-primary submit-form me-2" (click)="save()">
                                          <span *ngIf="isLoading || isSaving">Guardando...</span>
                                          <span *ngIf="!isLoading && !isSaving">Guardar</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                        </form>
                        
                    </div>
                </div>
                	
            </div>
            <!-- fin signos vitales -->						
        </div>
    </div>
</div>
