<div class="page-wrapper">
    <div class="content">
        <div class="page-header">
            <div class="row">
                <app-back-bottn style="width: 50px;"></app-back-bottn>
                <div class="col-sm-10">
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a routerLink="/roles/list">Roles</a></li>
                        <li class="breadcrumb-item"><i class="feather icon-chevron-right"></i></li>
                        <li class="breadcrumb-item active">{{ title }}</li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card-box">
                    <h4 class="card-title">{{ title }}</h4>
                    <form [formGroup]="roleForm">
                        <div class="form-group row">
                            <label class="col-form-label col-md-3">Nombre <span class="login-danger">*</span></label>
                            <div class="col-md-9">
                                <input type="text" formControlName="name" class="form-control">
                            </div>
                        </div>
                        <div class="col-12 text-end">
                            <button class="btn btn-primary" type="button" (click)="save()">Guardar</button>
                        </div>
                    </form>
                    <div *ngIf="text_validation" class="alert alert-danger">{{text_validation}}</div>
                    <div *ngIf="valid_form_success" class="alert alert-success">Rol {{ isEditMode ? 'editado' : 'creado' }} correctamente.</div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card-box">
                    <h4 class="card-title">Asignación de Permisos</h4>
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Sección</th>
                                    <th>Permisos</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let side of sideBar; let sideIndex = index">
                                    <td>{{side.menuValue}}</td>
                                    <td>
                                        <div *ngIf="side.subMenus && side.subMenus.length > 0">
                                            <div *ngFor="let subMenu of side.subMenus; let subIndex = index" class="checkbox">
                                                <label>
                                                    <input type="checkbox" [checked]="permissions.includes(subMenu.permision)" (click)="togglePermission(subMenu.permision, sideIndex * 100 + subIndex)">
                                                    {{subMenu.menuValue}}
                                                </label>
                                            </div>
                                        </div>
                                        <div *ngIf="!side.subMenus || side.subMenus.length === 0" class="checkbox">
                                            <label>
                                                <input type="checkbox" [checked]="permissions.includes(side.permision)" (click)="togglePermission(side.permision, sideIndex)">
                                                {{side.menuValue}}
                                            </label>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
