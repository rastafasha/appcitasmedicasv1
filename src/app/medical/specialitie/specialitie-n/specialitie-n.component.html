<div class="page-wrapper">
    <div class="content">
        <!-- Page Header -->
        <div class="page-header">
            <div class="row">
                <app-back-bottn style="width: 50px;"></app-back-bottn>
                <div class="col-sm-10">
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a routerLink="/specialities/list">Especialidades</a></li>
                        <li class="breadcrumb-item"><i class="feather icon-chevron-right"></i></li>
                        <li class="breadcrumb-item active">{{titlePage}}</li>
                    </ul>
                </div>
            </div>
        </div>
        <!-- /Page Header -->
         <app-loading *ngIf="isLoading"></app-loading>
        <div class="row justify-content-center"*ngIf="!isLoading">
            <div class="col-lg-8">
                <div class="card-box">
                    <h4 class="card-title">{{isEditing ? 'Editar' : 'Crear'}} Especialidad</h4>
                    <form [formGroup]="specialitieForm">
                        <div class="form-group row">
                            <label class="col-form-label col-md-2"><span class="login-danger">*</span> Nombre</label>
                            <div class="col-md-10">
                                <input class="form-control" formControlName="name" type="text">
                                <mat-error *ngIf="specialitieForm.get('name')?.invalid && specialitieForm.get('name')?.touched">
                                    Nombre requerido
                                </mat-error>
                            </div>
                        </div>
                        <div class="form-group row">
                            <label class="col-form-label col-md-2"><span class="login-danger">*</span> Estado</label>
                            <div class="col-md-10">
                                <div class="form-check-inline">
                                    <label class="form-check-label">
                                        <input type="radio" formControlName="state" [value]="1" class="form-check-input"> Activo
                                    </label>
                                </div>
                                <div class="form-check-inline">
                                    <label class="form-check-label">
                                        <input type="radio" formControlName="state" [value]="2" class="form-check-input"> Inactivo
                                    </label>
                                </div>
                                <mat-error *ngIf="specialitieForm.get('state')?.invalid && specialitieForm.get('state')?.touched" class="text-danger">
                                    Estado requerido
                                </mat-error>
                            </div>
                        </div>
                        <div class="form-group row" *ngIf="text_success">
                            <div class="col-md-12">
                                <div class="alert alert-success alert-dismissible fade show">
                                    <strong>Éxito!</strong> {{text_success}}
                                </div>
                            </div>
                        </div>
                        <div class="form-group row" *ngIf="text_validation">
                            <div class="col-md-12">
                                <div class="alert alert-warning alert-dismissible fade show">
                                    <strong>!</strong> {{text_validation}}
                                </div>
                            </div>
                        </div>
                        <div class="form-group row">
                            <div class="col-md-12 text-end">
                                <button type="button" class="btn btn-primary" (click)="save()">GUARDAR</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
